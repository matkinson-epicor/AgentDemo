<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <style>
    .logo-text { font-family: 'Arial', sans-serif; font-weight: bold; }
    .m-letter { fill: #2c3e50; }
    .a-letter { fill: #3498db; }
    .t-letter { fill: #2c3e50; }
    .k-letter { fill: #3498db; }
    .i-letter { fill: #2c3e50; }
    .n-letter { fill: #3498db; }
    .tagline { font-family: 'Arial', sans-serif; font-size: 10px; fill: #7f8c8d; }
  </style>
  
  <!-- Background shape -->
  <rect x="5" y="5" width="190" height="50" rx="10" ry="10" fill="#ecf0f1" />
  
  <!-- Logo text -->
  <g transform="translate(20, 40)">
    <text class="logo-text m-letter" x="0" y="0" font-size="32">M</text>
    <text class="logo-text a-letter" x="28" y="0" font-size="32">A</text>
    <text class="logo-text t-letter" x="56" y="0" font-size="32">T</text>
    <text class="logo-text k-letter" x="84" y="0" font-size="32">K</text>
    <text class="logo-text i-letter" x="112" y="0" font-size="32">I</text>
    <text class="logo-text n-letter" x="128" y="0" font-size="32">N</text>
  </g>
  
  <!-- Decorative element -->
  <path d="M10,30 L190,30" stroke="#3498db" stroke-width="2" stroke-dasharray="2,2" />
  
  <!-- Tagline -->
  <text class="tagline" x="100" y="55" text-anchor="middle">INNOVATIVE SOLUTIONS</text>
</svg>